name: Build EXE

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --noconsole --name Sprouting main.py

      - name: Zip output
        run: Compress-Archive -Path dist/Sprouting/* -DestinationPath Sprouting.zip

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Sprouting
          path: Sprouting.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Sprouting.zip
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
