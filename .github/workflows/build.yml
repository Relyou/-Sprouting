name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Check Python syntax
        run: |
          Get-ChildItem -Recurse -Filter *.py | ForEach-Object {
            python -m py_compile $_.FullName
          }
