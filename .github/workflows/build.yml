name: Build EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --noconsole --name 抽芽 main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: 抽芽
          path: dist/抽芽/
